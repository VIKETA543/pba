<div class="card">
    <p-toolbar>
        @if(learnerData){
        <label class="learner-name">{{learnerData[0].applicantSurname}} {{learnerData[0].applicantMiddlename}}
            {{learnerData[0].applicantLastname}}</label>
       <label class="learner-name">{{learnerData[0].AdmissionNumber}}</label>
        <ng-template #start>

        </ng-template>
        <ng-template #center>
    <div class="card  flex-col gap-4  justify-center ">
         <label class="header-lbl">{{this.learnerData[0].GradeDescription ??undefined}}</label> 
    <label class="header-lbl">{{this.academicData[0].TermlyObject  ??undefined}}</label>
     <label class="header-lbl">{{academicData[0].WeekDescription  ??undefined}}</label>
    
      <label class="header-lbl">{{academicData[0].ac_session  ??undefined}} YEAR</label>

      </div>
        </ng-template>
    }
        <ng-template #end>
            <!-- @if(learnerData.Image!==undefined){
            <div class="Image-container ballot-items">

                <img [src]="sanitizer.bypassSecurityTrustResourceUrl('data:image/jpeg;base64,' +learnerData[0].Image  )">
            </div>
            } -->
              <p-button label="Biils" [raised]="false" variant="text" severity="info" (click)="op.toggle($event)" />
              <p-divider/>
            <p-button (click)="op1.toggle($event)" icon="pi pi-ellipsis-v" label="Payments" variant="text" />
        </ng-template>
        
    </p-toolbar>
</div>
<div class="card flex justify-center">
    <p-popover #op>
        <p-button label="Spacial Levy" [raised]="false" variant="text" severity="success" (onClick)="specialLevy()" />
        <p-divider layout="horizontal"/>
        <p-button label="School Fee" [raised]="false" variant="text" severity="info" (click)="schoolFee()" />
        <p-divider layout="horizontal"/>
        <p-button label="Canteen" [raised]="false" variant="text" severity="secondary" (click)="canteenFee()" />
        <p-divider layout="horizontal"/>
        <p-button label="Buss Fee" [raised]="false" variant="text" severity="primary" (click)="bussFee()" />
        <p-divider layout="horizontal"/>
        <p-button label="PTA Dues" [raised]="false" variant="text" severity="help" (click)="ptaDues()" />
        <p-divider layout="horizontal"/>
        <p-button label="Uniforms" [raised]="false" variant="text" severity="success" (onClick)="uniForms()" />
        <p-divider layout="horizontal"/>
        <p-button label="Special Levy" [raised]="false" variant="text" severity="success" (onClick)="specialLevy()" />
</p-popover>
</div>
<div class="card flex justify-center">
    <p-popover #op1>
        <p-button label="Spacial Levy" [raised]="false" variant="text" severity="success" (onClick)="specialLevy()" />
        <p-button label="School Fee" [raised]="false" variant="text" severity="info" (click)="schoolFee()" />
        <p-button label="Canteen" [raised]="false" variant="text" severity="secondary" (click)="canteenFee()" />
        <p-button label="Buss Fee" [raised]="false" variant="text" severity="primary" (click)="bussFee()" />
        <p-button label="PTA Dues" [raised]="false" variant="text" severity="help" (click)="ptaDues()" />
        <p-button label="Uniforms" [raised]="false" variant="text" severity="success" (onClick)="uniForms()" />
</p-popover>

</div>
<div id="routercontainer">
   <router-outlet></router-outlet>
</div>
