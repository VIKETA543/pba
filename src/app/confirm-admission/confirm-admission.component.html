<mat-toolbar color="primary">
    <mat-toolbar-row fxLayout="row">
        <span class="title-center">Admission Confirmation</span>
    </mat-toolbar-row>

</mat-toolbar>
<mat-dialog-content class="mat-typography">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
        <ng-container matColumnDef="No.">
            <th mat-header-cell *matHeaderCellDef> No.</th>
            <td mat-cell *matCellDef="let element   let i = index;"> {{i+1}} </td>
          </ng-container>
        <ng-container matColumnDef="Application Number">
            <th mat-header-cell *matHeaderCellDef> Admission Number </th>
            <td mat-cell *matCellDef="let element" > {{element.appNumber}} </td>
          </ng-container>
        <!-- Name Column -->
        <ng-container matColumnDef="Surname">
          <th mat-header-cell *matHeaderCellDef>Surname </th>
          <td mat-cell *matCellDef="let element"> {{element.Surname}} </td>
        </ng-container>
      
        <!-- Weight Column -->
        <ng-container matColumnDef="Middle Name">
          <th mat-header-cell *matHeaderCellDef> Middle Name </th>
          <td mat-cell *matCellDef="let data"> {{data.Middlename}} </td>
        </ng-container>
      
        <!-- Symbol Column -->
        <ng-container matColumnDef="Last Name">
          <th mat-header-cell *matHeaderCellDef>Last Name </th>
          <td mat-cell *matCellDef="let element"> {{element.Lastname}} </td>
        </ng-container>
       
                <ng-container matColumnDef="Date Applied">
            <th mat-header-cell *matHeaderCellDef>Date Applied </th>
            <td mat-cell *matCellDef="let element"> {{element.applicationDate}} </td>
          </ng-container>

          <ng-container matColumnDef="Actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <!-- <td mat-cell *matCellDef="let element"> {{element.action}} </td> -->

            <td mat-cell *matCellDef="let row" class="btn-style">
                <button mat-raised-button color="primary"  matRipple (click)='reviewApplication(row.appNumber)'>
                    <mat-icon>streetview</mat-icon>
                 <!-- <span>Review</span> -->
                </button>
                <button mat-raised-button color="warn" matRipple (click)="confirmApplication(row.appNumber)">
                    <mat-icon>check</mat-icon>
                    <!-- <span>Confirm</span> -->
                </button>
                <button mat-raised-button color="warn" matRipple (click)="deleteApplication(row.appNumber)">
                    <mat-icon>delete_forever</mat-icon>
                   <!-- <span>Del</span>  -->
                 </button>

                 <button mat-raised-button color="warn" matRipple (click)="printAdmission(row.appNumber)" [matMenuTriggerFor]="printMenu">
                    <mat-icon>print</mat-icon>

                    <mat-menu #printMenu="matMenu" yPosition="below">
                        <button class="btnMenu" mat-menu-item>
                          <mat-icon>print</mat-icon>
                          <span> Summary</span>
                        </button>
                        <button class="btnMenu" mat-menu-item>
                          <mat-icon>print</mat-icon>
                          <span>Print Form</span>
                        </button>
                      </mat-menu>
                   <!-- <span>Del</span>  -->
                 </button>
              </td>
          </ng-container>


        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
     
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons
    aria-label="Select page of periodic elements">
</mat-paginator>
      
</mat-dialog-content>
